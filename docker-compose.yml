version: "3.9"

# LumiPath 本地开发全栈环境
# 启动：docker compose up -d
# 迁移：docker compose run --rm migrate
# 日志：docker compose logs -f backend

services:
  # ── PostgreSQL 16 + pgvector ──────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: lumipath_db
    environment:
      POSTGRES_DB: lumipath
      POSTGRES_USER: lumipath
      POSTGRES_PASSWORD: lumipath_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumipath -d lumipath"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lumipath_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ 3 (带管理 UI) ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lumipath_rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 管理 UI → http://localhost:15672  guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Neo4j 5 Community ─────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: lumipath_neo4j
    ports:
      - "17474:7474"   # HTTP Browser → http://localhost:17474
      - "17687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/lumipath_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Alembic 迁移（一次性任务）────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumipath_migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://lumipath:lumipath_dev_password@db:5432/lumipath
      APP_ENV: development
      APP_SECRET_KEY: change-me-to-a-long-random-secret-32-chars
      APP_MASTER_KEY: change-me-pgcrypto-master-key
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumipath_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      APP_SECRET_KEY: change-me-to-a-long-random-secret-32-chars
      APP_MASTER_KEY: change-me-pgcrypto-master-key
      DATABASE_URL: postgresql+asyncpg://lumipath:lumipath_dev_password@db:5432/lumipath
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lumipath_dev_password
      VAULT_BASE_PATH: /app/vault
    volumes:
      - ./backend/app:/app/app          # 热重载
      - ./vault:/app/vault              # 笔记挂载
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumipath_worker
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      -Q agent_long,embedding,notify,vault_sync
      --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      APP_SECRET_KEY: change-me-to-a-long-random-secret-32-chars
      APP_MASTER_KEY: change-me-pgcrypto-master-key
      DATABASE_URL: postgresql+asyncpg://lumipath:lumipath_dev_password@db:5432/lumipath
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL_SYNC: postgresql+psycopg2://lumipath:lumipath_dev_password@db:5432/lumipath
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lumipath_dev_password
      VAULT_BASE_PATH: /app/vault
    volumes:
      - ./backend/app:/app/app
      - ./vault:/app/vault
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  neo4j_data:
