[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os  # Use os.pathsep

# 忽略 alembic 自带的环境变量覆盖，我们在 env.py 中直接读取 app.config
sqlalchemy.url = postgresql+asyncpg://lumipath:lumipath_dev_password@localhost:5432/lumipath

[post_write_hooks]
# 格式化生成的脚本 (如果装了 ruff)
# hooks = ruff
# ruff.type = console_scripts
# ruff.executable = ruff
# ruff.options = check --fix

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
